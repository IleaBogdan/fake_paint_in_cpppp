name: Build and Release FakePaint

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - '**.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build project
      run: msbuild proiect_atestat_random_nou_pt_nota_10.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Upload Release to GitHub
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: FakePaint Release v${{ github.run_number }}
        body: |
          Windows Forms build for FakePaint (.NET Framework 4.7.2).
          Download and run the .exe from the assets below.
          Note that this is only in Beta phase.
          Any issues that may occur should be announced to get fixed.
        files: |
          proiect_atestat_random_nou_pt_nota_10/bin/Release/proiect_atestat_random_nou_pt_nota_10.exe
          proiect_atestat_random_nou_pt_nota_10/bin/Release/proiect_atestat_random_nou_pt_nota_10.exe.config
